name: Test and Publish NuGet

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: read

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"

            if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag '$tag' is not a valid NuGet version tag. Use v1.2.3 or 1.2.3."
              exit 1
            fi

            echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
            echo "IS_TAG=true" >> "$GITHUB_ENV"
          else
            echo "IS_TAG=false" >> "$GITHUB_ENV"
          fi

      - name: Restore
        run: dotnet restore AdifParser.sln

      - name: Test
        run: dotnet test AdifParser.sln --configuration Release --no-restore

      - name: Pack
        if: env.IS_TAG == 'true'
        run: >
          dotnet pack AdifParser/AdifParser.csproj
          --configuration Release
          --no-restore
          --output artifacts
          /p:Version=${PACKAGE_VERSION}
          /p:PackageVersion=${PACKAGE_VERSION}

      - name: Upload artifact
        if: env.IS_TAG == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg

      - name: Publish to NuGet
        if: env.IS_TAG == 'true'
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${NUGET_API_KEY}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
